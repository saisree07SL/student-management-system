<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
        }

        .container {
            width: 70%;
            margin: auto;
            margin-top: 40px;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background: #eee;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Student Management System</h2>

    <!-- FORM -->
    <div class="card">
        <h3>Add / Update Student</h3>

        <input type="text" id="name" placeholder="Name">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="course" placeholder="Course">

        <button onclick="addStudent()">Add Student</button>
        <button onclick="updateStudent()">Update Student</button>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h3>Student List</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentList"></tbody>
        </table>
    </div>

</div>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
